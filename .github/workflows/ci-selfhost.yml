name: ci-selfhost

on:
  pull_request:
    paths:
      - 'apps/console/**'
      - 'apps/control/**'
      - 'apps/probe-rs/**'
      - 'packages/**'
      - 'infra/compose/**'
      - 'package.json'
      - 'bun.lock'
  push:
    branches: ['main']
    paths:
      - 'apps/console/**'
      - 'apps/control/**'
      - 'apps/probe-rs/**'
      - 'packages/**'
      - 'infra/compose/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  selfhost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: docker/setup-buildx-action@v3
      - run: bun install --frozen-lockfile
      - run: bun run check:boundaries
      - run: bun run test:report-engine
      - run: bun run --cwd apps/console check
      - run: bun run --cwd apps/console build:selfhost
      - run: bun run --cwd apps/control check
      - run: bun run --cwd apps/control test
      - run: docker compose -f infra/compose/docker-compose.yml config >/dev/null
      - run: docker buildx build --platform linux/amd64 --load -t webperf-console:selfhost -f apps/console/Dockerfile .
      - run: docker buildx build --platform linux/amd64 --load -t webperf-control:ci -f apps/control/Dockerfile .
