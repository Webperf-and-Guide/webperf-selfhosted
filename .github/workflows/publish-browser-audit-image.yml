name: publish-browser-audit-image

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'apps/browser-audit-worker/**'
      - 'packages/contracts/**'
      - 'packages/domain-core/**'
      - 'package.json'
      - 'bun.lock'
      - 'infra/docker/**'
      - '.github/workflows/publish-browser-audit-image.yml'

concurrency:
  group: publish-browser-audit-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/webperf-and-guide/webperf-browser-audit-worker
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/browser-audit-worker/Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
