services:
  console:
    build:
      context: ../..
      dockerfile: apps/console/Dockerfile
    image: webperf-console:local
    depends_on:
      - control
    environment:
      CONTROL_BASE_URL: "${CONTROL_BASE_URL:-http://control:8788}"
      DEPLOY_TARGET: "${DEPLOY_TARGET:-pages}"
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      ORIGIN: "${CONSOLE_ORIGIN:-http://localhost:5173}"
      HOST: "${CONSOLE_HOST:-0.0.0.0}"
      PORT: "${CONSOLE_PORT:-3000}"
    ports:
      - "${CONSOLE_PUBLIC_PORT:-5173}:${CONSOLE_PORT:-3000}"

  probe:
    build:
      context: ../../apps/probe-rs
      dockerfile: Dockerfile
    image: webperf-probe:local
    environment:
      PROBE_SHARED_SECRET: "${PROBE_SHARED_SECRET:-dev-shared-secret}"
    ports:
      - "${PROBE_PUBLIC_PORT:-8080}:8080"

  control:
    build:
      context: ../..
      dockerfile: apps/control/Dockerfile
    image: webperf-control:local
    depends_on:
      - probe
    environment:
      SELFHOST_CONTROL_HOST: "${SELFHOST_CONTROL_HOST:-0.0.0.0}"
      SELFHOST_CONTROL_PORT: "${SELFHOST_CONTROL_PORT:-8788}"
      SELFHOST_DATABASE_PATH: "${SELFHOST_DATABASE_PATH:-/data/control.sqlite}"
      SELFHOST_RETENTION_DAYS: "${SELFHOST_RETENTION_DAYS:-30}"
      PROBE_SHARED_SECRET: "${PROBE_SHARED_SECRET:-dev-shared-secret}"
      SELFHOST_ACTIVE_REGION_CODES_JSON: '${SELFHOST_ACTIVE_REGION_CODES_JSON:-["tokyo"]}'
      SELFHOST_REGION_IDS_JSON: '${SELFHOST_REGION_IDS_JSON:-{"tokyo":"JP"}}'
      SELFHOST_PROBE_BASE_URLS_JSON: '${SELFHOST_PROBE_BASE_URLS_JSON:-{"tokyo":"http://probe:8080"}}'
      SELFHOST_MAX_TARGET_ATTEMPTS: "${SELFHOST_MAX_TARGET_ATTEMPTS:-1}"
    ports:
      - "${SELFHOST_CONTROL_PUBLIC_PORT:-8788}:${SELFHOST_CONTROL_PORT:-8788}"
    volumes:
      - control-data:/data

volumes:
  control-data:
